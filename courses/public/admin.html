<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <title>Admin Panel - CourseMatrix</title>

  <link rel="stylesheet" href="styles.css" />
  <style>
    .department {
      margin-bottom: 20px;
    }
    .department h3 {
      margin-bottom: 5px;
      font-size: 1.1em;
      font-weight: 600;
    }
    .courses {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }
    .courses label {
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .course-checkbox input {
      margin-right: 4px;
    }

    /* ADDED: Curriculum Overview styles (scoped, minimal) */
    #curriculum-overview {
      border: 1px solid #e6eef8;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      background: #ffffff;
      box-shadow: 0 1px 4px rgba(30,40,60,0.04);
    }
    #curriculum-overview h3 {
      margin: 0 0 8px 0;
      font-size: 1.15em;
    }
    #curriculum-overview p { margin: 6px 0; }
    #curriculum-overview ul { margin: 6px 0 0 18px; padding: 0; }
    #curriculum-overview li { margin-bottom: 4px; }
    /* end ADDED */

    /* ADDED: Full Curriculum Accordion styles */
    #curriculum-accordion-full {
      margin-bottom: 18px;
    }
    #curriculum-accordion .dept-card {
      border: 1px solid #e9eef6;
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 1px 3px rgba(20,30,50,0.03);
    }
    #curriculum-accordion .dept-header {
      padding: 12px 14px;
      background: #f5f8fb;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    #curriculum-accordion .dept-body {
      display: none;
      padding: 12px 14px;
      background: #fff;
    }
    #curriculum-accordion .semester {
      margin-bottom: 10px;
    }
    #curriculum-accordion .semester-header {
      font-weight: 700;
      margin-bottom: 8px;
      color: #2b3a55;
    }
    #curriculum-accordion .course-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 8px;
    }
    #curriculum-accordion .course-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #eef3fb;
      background: #fafcff;
    }
    #curriculum-accordion .course-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin: 0;
    }
    /* small responsive fix */
    @media (max-width: 640px) {
      #curriculum-accordion .course-list {
        grid-template-columns: 1fr;
      }
    }
    /* end ADDED */
  </style>
</head>

      const msg = document.getElementById("admin-login-msg");
      msg.textContent = "";
      if (!user || !pass) { msg.textContent = "Credentials required"; msg.style.color = "red"; return; }
      try {
        const res = await fetch("/api/admin/login", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ username: user, password: pass })
        });
        const body = await res.json();
        if (!res.ok) { msg.textContent = body.message || "Login failed"; msg.style.color = "red"; return; }
        adminToken = body.token;
        msg.textContent = "Logged in"; msg.style.color = "green";
        document.getElementById("admin-login-card").style.display = "none";
        document.getElementById("admin-main-card").style.display = "block";
        document.getElementById("student-list").innerHTML = "<div>Select a department and semester to load students.</div>";
      } catch (e) { msg.textContent = "Network error"; msg.style.color = "red"; }
    }

    async function loadStudents(department, semester) {
      currentDept = department;
      currentSem = semester;
      const container = document.getElementById("student-list");
      container.innerHTML = "Loading...";
      document.getElementById("alloc-msg").textContent = "";
      document.getElementById("multi-info").innerHTML = "";
      /* MODIFIED: when clearing original checkboxes, dispatch a change event so grouped UI stays in sync */
      Array.from(document.querySelectorAll("#alloc-list input")).forEach(i => { i.checked = false; i.dispatchEvent(new Event('change', { bubbles: true })); });
      try {
        if (!department || !semester) {
          container.innerHTML = "<div>Please select department and semester.</div>";
          // ADDED: hide overview when nothing selected
          const ov = document.getElementById("curriculum-overview");
          if (ov) ov.style.display = "none";
          return;
        }
        const res = await fetch(`/api/admin/students?department=${encodeURIComponent(department)}&semester=${encodeURIComponent(semester)}`, {
          headers: { Authorization: "Bearer " + adminToken }
        });
        const body = await res.json();
        if (!res.ok) {
          container.innerHTML = `<div style="color:red;">${body.message || "Failed to load students"}</div>`;
          // ADDED: hide overview on error
          const ov = document.getElementById("curriculum-overview");
          if (ov) ov.style.display = "none";
          return;
        }
        const studentsArray = Object.values(body.students || {});
        container.innerHTML = "";
        if (studentsArray.length === 0) {
          container.innerHTML = "<div>No students in this department & semester.</div>";
        } else {
          studentsArray.forEach(s => {
            const div = document.createElement("div");
            div.style.padding = "4px 0";
            div.textContent = `${s.roll} — ${s.name}`;
            container.appendChild(div);
          });
        }
        showDepartmentInfo(studentsArray.map(s => s.roll));

        // ADDED: ensure grouped accordion reflects current state (highlighting handled by separate function)
        // Scroll/expand to selected department & semester
        highlightDeptSemInAccordion(department, semester);
      } catch (e) {
        container.innerHTML = "<div style='color:red;'>Network error</div>";
        const ov = document.getElementById("curriculum-overview");
        if (ov) ov.style.display = "none";
      }
    }

    async function showDepartmentInfo(rolls) {
      const info = document.getElementById("multi-info");
      if (!rolls || rolls.length === 0) { info.innerHTML = ""; return; }
      const sections = [];
      for (const roll of rolls) {
        const [allocRes, selRes] = await Promise.all([
          fetch(`/api/allocated/${roll}`),
          fetch(`/api/selection/${roll}`)
        ]);
        let allocHtml = "";
        if (allocRes.ok) {
          const { allocation } = await allocRes.json();
          allocHtml = `<div><strong>Allocated:</strong> ${allocation.courses.join(", ")}</div>`;
        } else {
          const err = await allocRes.json().catch(() => ({ message: "None" }));
          allocHtml = `<div><strong>Allocated:</strong> <span style="color:#a00;">${err.message}</span></div>`;
        }
        let selHtml = "";
        if (selRes.ok) {
          const { selection } = await selRes.json();
          selHtml = `<div><strong>Submitted:</strong> ${selection.courses.join(", ")}</div>`;
        } else {
          const err = await selRes.json().catch(() => ({ message: "None yet" }));
          selHtml = `<div><strong>Submitted:</strong> <span style="color:#555;">${err.message}</span></div>`;
        }
        sections.push(`
          <div style="border:1px solid #ddd; padding:8px; border-radius:6px; margin-bottom:6px;">
            <div><strong>${roll}</strong></div>
            ${allocHtml}
            ${selHtml}
          </div>
        `);
      }
      info.innerHTML = sections.join("");
    }

    /* ADDED: build full curriculum accordion (Department -> Semester -> Courses).
       This scans the existing #alloc-list content and creates a grouped view.
       It also syncs checkboxes between the grouped view and the original checkboxes.
    */
    function buildCurriculumAccordion() {
      const allocList = document.getElementById('alloc-list');
      const container = document.getElementById('curriculum-accordion');
      if (!allocList || !container) return;
      container.innerHTML = '';

      const deptNodes = Array.from(allocList.querySelectorAll('.department'));
      deptNodes.forEach((deptNode, deptIndex) => {
        const deptName = (deptNode.querySelector('h3') && deptNode.querySelector('h3').textContent.trim()) || deptNode.dataset.dept || `Department ${deptIndex+1}`;

        // Map semester number -> courses array
        const semMap = {};
        const courseLabels = Array.from(deptNode.querySelectorAll('.course-checkbox'));
        courseLabels.forEach((lbl, idx) => {
          const span = lbl.querySelector('span');
          const input = lbl.querySelector('input[type="checkbox"]');
          if (!span) return;
          const txt = span.textContent.trim();

          // Extract semester number from "(1st Sem)" etc.
          const semMatch = txt.match(/\((\d+)(st|nd|rd|th)\s+Sem\)/i);
          const semNum = semMatch ? parseInt(semMatch[1], 10) : 0;

          // Remove trailing "(Nth Sem)" from displayed course name
          const courseName = txt.replace(/\s*\(\d+(st|nd|rd|th)[^)]+\)\s*$/i, '').trim();

          // Create unique key to link original input and grouped checkbox
          const key = `${deptIndex}||${semNum}||${idx}`;
          if (input) input.dataset.cmKey = key; // annotate original input

          if (!semMap[semNum]) semMap[semNum] = [];
          semMap[semNum].push({ name: courseName, orig: input, key });
        });

        // Build department card
        const deptCard = document.createElement('div');
        deptCard.className = 'dept-card';

        const header = document.createElement('div');
        header.className = 'dept-header';
        header.textContent = deptName;

        const chevron = document.createElement('span');
        chevron.textContent = '+';
        chevron.style.opacity = '0.6';
        header.appendChild(chevron);

        const body = document.createElement('div');
        body.className = 'dept-body';

        // Sort semester keys numerically (exclude 0 if present)
        const semKeys = Object.keys(semMap).map(k => parseInt(k, 10)).filter(k => !isNaN(k)).sort((a,b) => a - b);

        semKeys.forEach(semNum => {
          if (semNum === 0) return; // skip unknown sems
          const semDiv = document.createElement('div');
          semDiv.className = 'semester';

          const semHeader = document.createElement('div');
          semHeader.className = 'semester-header';
          semHeader.textContent = 'Semester ' + semNum;
          semDiv.appendChild(semHeader);

          const courseContainer = document.createElement('div');
          courseContainer.className = 'course-list';

          semMap[semNum].forEach(course => {
            const item = document.createElement('label');
            item.className = 'course-item';

            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.className = 'grp-checkbox';
            cb.dataset.cmKey = course.key;

            // initialize checkbox checked state based on original input (if exists)
            if (course.orig) cb.checked = !!course.orig.checked;

            const txt = document.createElement('span');
            txt.textContent = course.name;

            item.appendChild(cb);
            item.appendChild(txt);
            courseContainer.appendChild(item);

            // When grouped checkbox toggled, toggle original checkbox (if present)
            cb.addEventListener('change', () => {
              if (course.orig) {
                course.orig.checked = cb.checked;
                // Dispatch change event on original input so other logic (if any) reacts
                course.orig.dispatchEvent(new Event('change', { bubbles: true }));
              }
            });

            // When original input changes (including programmatically, if it dispatches 'change'), update grouped checkbox
            if (course.orig) {
              course.orig.addEventListener('change', () => {
                cb.checked = !!course.orig.checked;
              });
            }
          });

          semDiv.appendChild(courseContainer);
          body.appendChild(semDiv);
        });

        // toggle behavior for department header
        header.addEventListener('click', () => {
          const isOpen = body.style.display === 'block';
          body.style.display = isOpen ? 'none' : 'block';
          chevron.textContent = isOpen ? '+' : '−';
        });

        deptCard.appendChild(header);
        deptCard.appendChild(body);
        container.appendChild(deptCard);
      });
    }

    // ADDED: helper to expand and scroll to selected dept+sem in accordion
    function highlightDeptSemInAccordion(deptShort, sem) {
  const container = document.getElementById('curriculum-accordion');
  if (!container) return;

  // find department card by matching original data-dept
  const deptCards = Array.from(container.querySelectorAll('.dept-card'));
  let matchedCard = null;

  // Find index of department in #alloc-list
  const allocDeptNodes = Array.from(document.querySelectorAll('#alloc-list .department'));
  const deptIndex = allocDeptNodes.findIndex(d => d.dataset.dept === deptShort);

  if (deptIndex !== -1 && deptCards[deptIndex]) {
    matchedCard = deptCards[deptIndex];
  }

  if (!matchedCard) return;

  // expand matched card
  const body = matchedCard.querySelector('.dept-body');
  const chevron = matchedCard.querySelector('.dept-header span');
  if (body && body.style.display !== 'block') {
    body.style.display = 'block';
    if (chevron) chevron.textContent = '−';
  }

  // find semester header inside and scroll into view
  const semHeader = Array.from(matchedCard.querySelectorAll('.semester-header'))
    .find(h => h.textContent.trim().toLowerCase() === ('semester ' + sem).toLowerCase());

  if (semHeader) {
    semHeader.scrollIntoView({ behavior: 'smooth', block: 'center' });
    semHeader.style.transition = 'background 0.4s';
    const origBg = semHeader.style.background;
    semHeader.style.background = '#fff5d6';
    setTimeout(() => { semHeader.style.background = origBg; }, 800);
  }
}


    // Build accordion on page load
    document.addEventListener('DOMContentLoaded', () => {
      buildCurriculumAccordion();

      // If someone later modifies the #alloc-list structure (unlikely), observe and rebuild
      const allocList = document.getElementById('alloc-list');
      if (allocList && window.MutationObserver) {
        const mo = new MutationObserver(() => { buildCurriculumAccordion(); });
        mo.observe(allocList, { childList: true, subtree: true });
      }
    });
    // end ADDED

    document.getElementById("btn-admin-login").addEventListener("click", adminLogin);

    // ✅ On change of dept or semester, load students
    document.getElementById("dept-filter").addEventListener("change", () => {
      loadStudents(document.getElementById("dept-filter").value.trim(), document.getElementById("sem-filter").value.trim());
    });
    document.getElementById("sem-filter").addEventListener("change", () => {
      loadStudents(document.getElementById("dept-filter").value.trim(), document.getElementById("sem-filter").value.trim());
    });

    document.getElementById("btn-allocate").addEventListener("click", async () => {
      const msg = document.getElementById("alloc-msg"); msg.textContent = "";
      if (!currentDept || !currentSem) { msg.textContent = "Select department and semester first"; msg.style.color = "red"; return; }
      try {
        const resStudents = await fetch(`/api/admin/students?department=${encodeURIComponent(currentDept)}&semester=${encodeURIComponent(currentSem)}`, {
          headers: { Authorization: "Bearer " + adminToken }
        });
        const bodyStudents = await resStudents.json();
        if (!resStudents.ok) { msg.textContent = bodyStudents.message || "Failed to get students"; msg.style.color = "red"; return; }
        const rolls = Object.values(bodyStudents.students || {}).map(s => s.roll);
        if (rolls.length === 0) { msg.textContent = "No students to allocate"; msg.style.color = "red"; return; }

        const departmentDiv = Array.from(document.querySelectorAll("#alloc-list .department"))
          .find(d => d.dataset.dept === currentDept);

        if (!departmentDiv) { msg.textContent = "No courses found for this department"; msg.style.color = "red"; return; }

        const courses = Array.from(departmentDiv.querySelectorAll("input:checked")).map(i => i.value);
        if (courses.length === 0) { msg.textContent = "Pick at least one course"; msg.style.color = "red"; return; }

        const res = await fetch("/api/admin/allocate", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + adminToken },
          body: JSON.stringify({ department: currentDept, semester: currentSem, courses })
        });
        const body = await res.json();
        if (!res.ok) { msg.textContent = body.message || "Allocation failed"; msg.style.color = "red"; return; }
        msg.textContent = `Allocated to ${rolls.length} student(s)`; msg.style.color = "green";
        await showDepartmentInfo(rolls);
      } catch (e) { msg.textContent = "Network error"; msg.style.color = "red"; }
    });
  </script>
</body>
